<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Academia</title>
    <style>
        body { 
            font-family: Arial, sans-serif;; 
            background-color: #A2D2FF; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        /* --- LOGO AMPLIADA E COM MAIS MOVIMENTO --- */
        .logo-top-wrapper {
            margin-bottom: 30px; /* Ajustado para aproximar do card com a logo maior */
            z-index: 10; 
            text-align: center;
            /* Animação mais intensa e levemente mais rápida */
            animation: float-intense 2.5s ease-in-out infinite; 
        }

        .logo-img {
            width: 140px; /* Aumentada de 110px para 160px */
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            border: 6px solid #ffffff; 
            outline: 3px solid #000080;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
            background-color: #fff;
        }

        /* Animação Intensificada: sobe mais e tem uma leve variação de escala */
        @keyframes float-intense {
            0% { 
                transform: translateY(0px) scale(1); 
            }
            50% { 
                transform: translateY(-25px) scale(1.05); /* Sobe 25px e pulsa levemente */
            }
            100% { 
                transform: translateY(0px) scale(1); 
            }
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
            background: white; 
            padding: 40px 35px 35px 35px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); 
            border-top: 6px solid #000080;
        }

        h1 { 
            color: #000080; 
            text-align: center; 
            margin-bottom: 25px; 
            font-size: 1.5em; 
            letter-spacing: -0.5px;
        }

        form { display: flex; flex-direction: column; }
        
        label { 
            margin-top: 15px; 
            font-weight: bold; 
            color: #000080; 
            font-size: 0.85em;
            margin-left: 5px;
        }
        
        input { 
            padding: 14px; 
            margin-top: 6px; 
            border: 2px solid #eef2f7; 
            border-radius: 12px; 
            font-size: 1em;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #000080;
            background-color: #f8faff;
            box-shadow: 0 0 0 4px rgba(0, 0, 80, 0.1);
        }

        button { 
            padding: 14px; 
            cursor: pointer; 
            border: none; 
            border-radius: 12px; 
            background: #000080; 
            color: white; 
            margin-top: 30px; 
            font-weight: bold; 
            font-size: 1.1em;
            box-shadow: 0 4px 12px rgba(0, 0, 80, 0.2);
            transition: all 0.3s;
        }

        button:hover { 
            opacity: 0.95; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 80, 0.3);
        }

        .signup-link { 
            text-align: center; 
            margin-top: 25px; 
            font-size: 0.9em; 
            color: #7f8c8d; 
        }
        
        .signup-link a { 
            color: #000080; 
            font-weight: bold; 
            text-decoration: none;
            margin-left: 5px;
        }
        
        .signup-link a:hover { text-decoration: underline; }

    </style>
</head>
<body>

    <div class="logo-top-wrapper">
        <img src="img/logo.png" alt="Logo Academia" class="logo-img">
    </div>

    <div class="container">
        <h1>Acessar Sistema</h1>

        <form id="login-form">
            <label>Login</label>
            <input type="text" id="login" placeholder="Digite seu usuário" required>

            <label>Senha</label>
            <input type="password" id="password" placeholder="••••••••" required>

            <button type="submit">Entrar na Conta</button>
        </form>

        <div class="signup-link">
            Novo por aqui? <a href="cadastrar.html">Crie sua conta</a>
        </div>
    </div>

    <script src="loginScript.js"></script>
</body>
</html>
