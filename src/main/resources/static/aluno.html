<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciamento de Alunos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #A2D2FF;
            padding: 40px 20px; /* Espaço para a animação da logo */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- LOGO PADRONIZADA --- */
        .logo-top-wrapper {
            margin-bottom: 5px; 
            z-index: 10; 
            text-align: center;
            animation: float-intense 2.5s ease-in-out infinite; 
        }

        .logo-img {
            width: 130px; /* Tamanho levemente menor para telas de dados */
            height: 130px;
            object-fit: cover;
            border-radius: 50%;
            border: 6px solid #ffffff; 
            outline: 3px solid #000080;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
            background-color: #fff;
        }

        @keyframes float-intense {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.03); } 
            100% { transform: translateY(0px) scale(1); }
        }

        h1, h2 {
            color: #000080;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-top: 10px;
            box-sizing: border-box;
        }

        form {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 10px;
            font-weight: bold;
            color: #000080;
            font-size: 0.9em;
        }

        input, select {
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #000080;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        .search-section {
            margin: 25px 0;
            display: flex;
            gap: 8px;
        }

        .search-section input {
            flex: 1;
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #eee;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            color: #000080;
        }

        td { color: #333; }

        .btn-home {
            text-decoration: none;
            padding: 10px 18px;
            color: white;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #000080;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-home:hover {
            opacity: 0.8;
        }
        #btn-cancel{
            display:none;
            margin-top: 10px; 
            background: #000080;
        }

        /* Ajuste Mobile */
        @media (max-width: 600px) {
            .search-section { flex-direction: column; }
            table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>

    <div class="logo-top-wrapper">
        <img src="img/logo.png" alt="Logo Academia" class="logo-img">
    </div>

    <div class="container">
        <a href="telaMenu.html" class="btn-home">⬅ Voltar ao Menu</a>
        
        <h1>Academia - Gestão de Alunos</h1>

        <div class="form-section">
            <h2 id="form-title" style="text-align: left; font-size: 1.2em;">Cadastrar Aluno</h2>
            <form id="aluno-form">
                <input type="hidden" id="aluno-id">

                <label>Nome:</label>
                <input type="text" id="nome" placeholder="Nome Completo" required>

                <label>Idade:</label>
                <input type="number" id="idade" placeholder="Ex: 20" required>

                <label>Sexo:</label>
                <select id="sexo" required>
                    <option value="" disabled selected>Selecione o sexo...</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Outro">Outro</option>
                </select>

                <button type="submit" id="btn-save" style="margin-top: 15px;">Salvar Aluno</button>
                <button type="button" id="btn-cancel" onclick="resetForm()">Cancelar Edição</button>
            </form>
        </div>

        <div class="search-section">
            <input type="text" id="search-name" placeholder="Buscar por nome...">
            <button onclick="buscarPorNome()">Buscar</button>
            <button onclick="listarTodos()" style="background-color: #000080;">Listar Todos</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Sexo</th>
                    <th>Cargo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="aluno-table-body">
                </tbody>
        </table>
    </div>

    <script src="alunoScript.js"></script>
</body>
</html>
