<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Avaliações Físicas - Início</title>
    <style>
        body {
            background: #A2D2FF;
            font-family: Arial, sans-serif;
            margin: 0;
            /* Mudança chave: usamos flex para centralizar verticalmente */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            /* Espaço extra no topo para o "pulo" da animação não cortar */
            padding: 55px 20px 20px 20px; 
            box-sizing: border-box;
        }

        /* --- LOGO IDENTICA À TELA DE LOGIN --- */
        .logo-top-wrapper {
            margin-bottom: 5px; 
            z-index: 10; 
            text-align: center;
            /* Mantendo sua animação */
            animation: float-intense 2.5s ease-in-out infinite; 
        }

        .logo-img {
            width: 140px; 
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            border: 6px solid #ffffff; 
            outline: 3px solid #000080;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
            background-color: #fff;
        }

        @keyframes float-intense {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-25px) scale(1.05); }
            100% { transform: translateY(0px) scale(1); }
        }

        h1 {
            color: #000080;
            font-size: 35px;
            text-align: center;
            margin: 25px 0 30px 0; 
        }

        .header-acoes {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .btn-logout {
            background-color: #000080;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-logout:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .menu-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
        }

        .hidden {
            display: none !important;
        }

        .menu-card { 
            background-color: #000080;
            border-radius: 40px; /* Levemente menos redondo para caber melhor o texto */
            padding: 30px; 
            text-align: center; 
            text-decoration: none; 
            color: white; 
            transition: 0.3s;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .menu-card:hover { 
            transform: translateY(-8px); 
            background: #0000CD;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
        }

        .menu-card h2 { color: white; margin: 15px 0 10px 0; font-size: 1.4em; }
        .menu-card p { font-size: 14px; opacity: 0.9; line-height: 1.4; }

        @media (max-width: 768px) {
            body { padding-top: 100px; } /* Mais espaço no mobile */
            .menu-container { grid-template-columns: 1fr; }
            .header-acoes { position: absolute; top: 10px; right: 10px; }
            .btn-logout { padding: 8px 15px; font-size: 14px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

    <div class="logo-top-wrapper">
        <img src="img/logo.png" alt="Logo Academia" class="logo-img">
    </div>

    <div class="header-acoes">
        <button onclick="logout()" class="btn-logout">
            Sair <span>🚪</span>
        </button>
    </div>

    <div class="container">
        <h1>Sistema de Gestão</h1>
        
        <div class="menu-container" id="main-menu">
            <a href="aluno.html" class="menu-card" id="card-alunos">
                <div style="font-size: 50px;">👤</div>
                <h2>Alunos</h2>
                <p>Gerenciar cadastros e dados básicos.</p>
            </a>
            <a href="circunferencia.html" class="menu-card">
                <div style="font-size: 50px;">📉</div>
                <h2>Antropometria</h2>
                <p>Circunferências e medidas corporais.</p>
            </a>
            <a href="dobras.html" class="menu-card">
                <div style="font-size: 50px;">📏</div>
                <h2>Dobras Cutâneas</h2>
                <p>Composição corporal e índices de saúde.</p>
            </a>
        </div>
    </div>

    <script>
        // ... (seu script de logout e JWT permanece o mesmo)
        function logout() {
            localStorage.removeItem('token');
            window.location.href = "index.html";
        }

        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        window.onload = function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = "index.html";
                return;
            }

            const payload = parseJwt(token);
            const userRole = payload ? payload.role : "";

            if (userRole === "USER") {
                const cardAlunos = document.getElementById('card-alunos');
                if (cardAlunos) {
                    cardAlunos.classList.add('hidden');
                    document.getElementById('main-menu').style.gridTemplateColumns = "repeat(2, 1fr)";
                    document.getElementById('main-menu').style.maxWidth = "700px";
                    document.getElementById('main-menu').style.margin = "0 auto";
                }
            }
        }
    </script>
</body>
</html>
